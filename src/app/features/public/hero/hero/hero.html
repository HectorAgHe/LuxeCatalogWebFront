<section class="hero-slider">

  <!-- Slides -->
  @for (image of images(); track image.id; let i = $index) {
    <div class="hero-slide"
      [class.active]="i === currentIndex()"
      [style.background-image]="'url(' + image.url + ')'">
    </div>
  }

  <!-- Overlay -->
  <div class="hero-overlay"></div>

  <!-- Contenido -->
  <div class="container-xl h-100">
    <div class="row h-100 align-items-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="hero-content">
          <p class="hero-eyebrow">Colección Exclusiva</p>
          <h1 class="hero-title">
            Descubre el estilo <br>
            <span>que te define</span>
          </h1>
          <p class="hero-subtitle">
            Explora nuestros catálogos de temporada y encuentra
            piezas únicas para cada ocasión.
          </p>
          <a routerLink="/catalogos" class="hero-cta">
            Ver Catálogos
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
              fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Flecha anterior -->
  <button class="hero-arrow hero-arrow-left" (click)="prev()" aria-label="Anterior">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
      viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
    </svg>
  </button>

  <!-- Flecha siguiente -->
  <button class="hero-arrow hero-arrow-right" (click)="next()" aria-label="Siguiente">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
      viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
    </svg>
  </button>

  <!-- Dots -->
  <div class="hero-dots">
    @for (image of images(); track image.id; let i = $index) {
      <button class="hero-dot" [class.active]="i === currentIndex()"
        (click)="goTo(i)" [attr.aria-label]="'Ir a imagen ' + (i + 1)">
      </button>
    }
  </div>

</section>
