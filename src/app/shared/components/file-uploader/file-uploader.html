<div class="fu-wrapper">

  @if (activeUrl()) {

    <!-- Preview del archivo subido -->
    <div class="fu-preview">

      @if (isImage()) {
        <img [src]="activeUrl()!" class="fu-preview-img" alt="Preview"/>
      } @else if (isPdf()) {
        <div class="fu-preview-pdf">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none"
            viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
          </svg>
          <span class="fu-filename">{{ fileName() }}</span>
        </div>
      }

      <!-- Acciones sobre el archivo -->
      <div class="fu-preview-actions">
        <a [href]="activeUrl()!" target="_blank" class="fu-btn-view">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none"
            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
          </svg>
          Ver archivo
        </a>
        <button type="button" class="fu-btn-remove" (click)="removeFile()">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none"
            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
          Eliminar
        </button>
      </div>

    </div>

  } @else {

    <!-- Drop zone -->
    <label
      class="fu-dropzone"
      [class.dragging]="isDragging()"
      [class.loading]="uploading()"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave()"
      (drop)="onDrop($event)"
    >
      <input
        type="file"
        class="fu-input-hidden"
        [accept]="accept()"
        (change)="onFileSelected($event)"
        [disabled]="uploading()"
      />

      @if (uploading()) {
        <div class="fu-uploading">
          <div class="fu-spinner"></div>
          <span>Subiendo {{ fileName() }}...</span>
        </div>
      } @else {
        <div class="fu-dropzone-content">
          <div class="fu-icon-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none"
              viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
          </div>
          <p class="fu-main-text">{{ label() }}</p>
          <p class="fu-sub-text">Arrastra aquí o <span class="fu-link">selecciona un archivo</span></p>
        </div>
      }

    </label>

  }

  <!-- Error -->
  @if (error()) {
    <p class="fu-error">{{ error() }}</p>
  }

</div>
